<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta http-equiv="refresh" content="0; url=./web/">
  <link rel="canonical" href="./web/">
  <title>Redirecting…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #fce8f3 50%, #e8f5ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      color: #1c1c1e;
    }
    .card {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px 48px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 8px 32px rgba(31,38,135,0.12);
      text-align: center;
    }
    h1 { font-size: 22px; margin: 0 0 10px; font-weight: 700; letter-spacing: -0.3px; }
    p  { color: rgba(60,60,67,0.7); font-size: 14px; margin: 6px 0; }
    a  { color: #007aff; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1></h1>
    <p>正在跳轉至網頁版…</p>
    <p>若瀏覽器未自動跳轉，請點 <a href="./web/">這裡進入</a>。</p>
  </div>
</body>
</html>
